version: '3.8'

services:
  # Motor de procesamiento PySpark (Capa de Aplicación y Cómputo)
  spark_engine:
    build: .
    container_name: spark_engine_container
    restart: always
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      cassandra_fleet:
        condition: service_healthy
      mongo_fleet:
        condition: service_healthy
      postgres_fleet:
        condition: service_healthy
    networks:
      - fleet_network

  # Capa de Exposición (API FastAPI)
  app_api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fastapi_fleet_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGO_HOST=mongo_fleet:27017
      - CASSANDRA_HOST=cassandra_fleet:9042
      - POSTGRES_URL=jdbc:postgresql://postgres_fleet:5432/smart_fleet_db
    volumes:
      - .:/app
    depends_on:
      mongo_fleet:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - fleet_network

  app_frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: streamlit_fleet_frontend
    ports:
      - "8501:8501"
    environment:
      - NODE_ENV=development
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    depends_on:
      app_api:
        condition: service_healthy
    networks:
      - fleet_network
    restart: always

  # Ingesta masiva y series temporales (NoSQL Columnar)
  cassandra_fleet:
    image: cassandra:4.1
    container_name: cassandra_fleet
    environment:
      - TZ=America/Lima
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - fleet_network

  # Data Warehouse analítico (NoSQL Documental)
  mongo_fleet:
    image: mongo:6.0
    container_name: mongo_fleet
    hostname: mongo_fleet
    command: mongod --replSet rs0 --keyFile /data/db/mongodb.key --bind_ip_all
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_USER}", "-p", "${MONGO_PASS}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - fleet_network


  # Seguridad y auditoría (SQL Relacional)
  postgres_fleet:
    image: postgres:15-alpine
    container_name: postgres_fleet
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - fleet_network

  # Ingestador y simulador automático de telemetría (Ingesta en Cassandra)
  telemetry_simulator:
    build: .
    container_name: telemetry_simulator
    restart: always
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      cassandra_fleet:
        condition: service_healthy
    networks:
      - fleet_network
    command: python -c "import sys, time; sys.path.append(\"src/backend\"); from simulador_gps import simular_movimiento; [simular_movimiento(\"TRIP-MANUAL-TEST-99\", -12.0464, -77.0428) or time.sleep(1) for _ in iter(int, 1)]"

# Declaración de volúmenes persistentes locales
volumes:
  cassandra_data:
  mongo_data:
  postgres_data:

# Configuración de red común para comunicación aislada entre contenedores
networks:
  fleet_network:
    driver: bridge